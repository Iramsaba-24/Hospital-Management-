name: Hospital-Managment - Continuous Integration

on:
 push:
   branches-ignore:
    - develop
    - qa
    - uat
    - production

 pull_request:
    branches:
      - develop
      - qa
      - uat
      - production

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
    
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
    
      - run: npm ci
      - run: npm run lint


  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint


    steps:
    - uses: actions/checkout@v4
  
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
  
    - run: npm ci
    - run: npm run type-check


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: type-check


    steps:
      - uses: actions/checkout@v4
    
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
    
      - run: npm ci
      - run: npm run build


  notify-success:
    name: Notify Success
    needs: build
    if: success()
    runs-on: ubuntu-latest


    steps:
      - run: |
          echo "✅ Build completed successfully"


  notify-failure:
    name: Notify Failure
    needs: build
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "❌ Build failed"

